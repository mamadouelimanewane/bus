<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#004A99">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SunuBus — Transport Dakar</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* ── Reset & Variables ── */
:root {
  --primary: #004A99;
  --primary-dark: #003370;
  --primary-light: #1A6FCC;
  --accent: #FF6B00;
  --success: #1D9E75;
  --warning: #F59E0B;
  --danger: #EF4444;
  --bg: #F0F4F8;
  --surface: #FFFFFF;
  --surface2: #F8FAFC;
  --border: #E2E8F0;
  --text: #1A202C;
  --text2: #64748B;
  --text3: #94A3B8;
  --nav-h: 64px;
  --header-h: 56px;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,74,153,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* ── App Shell ── */
#app { display: flex; flex-direction: column; height: 100%; }
#content { flex: 1; overflow: hidden; position: relative; }

/* ── Tab Panes ── */
.tab-pane { display: none; height: 100%; overflow-y: auto; flex-direction: column; }
.tab-pane.active { display: flex; }
#tab-carte { overflow: hidden; position: relative; }
#tab-trajet, #tab-lignes, #tab-chercher, #tab-favoris { padding: 0; }
#tab-stop-detail, #tab-line-detail { padding: 0; }

/* ── Tab Header ── */
.tab-header { background: var(--primary); color: white; padding: 16px; flex-shrink: 0; }
.tab-header h2 { font-size: 18px; font-weight: 600; }

/* ── Bottom Nav ── */
#bottom-nav {
  display: flex; background: var(--surface);
  border-top: 1px solid var(--border);
  height: var(--nav-h); flex-shrink: 0;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; border: none; background: none;
  color: var(--text3); transition: color 0.2s; padding: 6px 0; font-size: 10px; font-weight: 500;
}
.nav-tab svg { width: 22px; height: 22px; }
.nav-tab.active { color: var(--primary); }
.nav-tab.active svg { fill: var(--primary); }

/* ── Map ── */
#map-canvas { position: absolute; inset: 0; z-index: 1; }
.map-search-bar {
  position: absolute; top: 12px; left: 12px; right: 12px; z-index: 10;
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}
.map-search-bar input { flex: 1; border: none; outline: none; font-size: 14px; color: var(--text); background: none; }
.map-search-bar button { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }

/* ── Bus & Stop Markers ── */
.bus-marker {
  color: white; font-size: 10px; font-weight: 700;
  border-radius: 6px; padding: 2px 5px; white-space: nowrap;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3); border: 1.5px solid rgba(255,255,255,0.4);
}
.stop-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary); border: 2px solid white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.user-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #3B82F6; border: 3px solid white;
  box-shadow: 0 2px 8px rgba(59,130,246,0.5);
  animation: pulse-user 2s infinite;
}
@keyframes pulse-user {
  0%,100% { box-shadow: 0 2px 8px rgba(59,130,246,0.5); }
  50% { box-shadow: 0 2px 16px rgba(59,130,246,0.8), 0 0 0 6px rgba(59,130,246,0.15); }
}

/* ── Popup ── */
.popup-stop strong { display: block; font-size: 13px; margin-bottom: 2px; }
.popup-stop span { font-size: 11px; color: var(--text2); }
.popup-stop button { margin-top: 6px; width: 100%; background: var(--primary); color: white; border: none; border-radius: 6px; padding: 6px; font-size: 12px; cursor: pointer; }

/* ── Planner ── */
.planner-form { background: var(--primary); padding: 16px; flex-shrink: 0; }
.planner-form h2 { color: white; font-size: 16px; margin-bottom: 12px; font-weight: 600; }
.planner-input-group { background: white; border-radius: var(--radius); overflow: hidden; }
.planner-row { display: flex; align-items: center; padding: 10px 14px; gap: 10px; }
.planner-row + .planner-row { border-top: 1px solid var(--border); }
.planner-row span { font-size: 16px; width: 22px; text-align: center; }
.planner-row input { flex: 1; border: none; outline: none; font-size: 14px; color: var(--text); background: none; }
.btn-search-route {
  margin-top: 10px; width: 100%; background: var(--accent);
  color: white; border: none; border-radius: 10px;
  padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 12px rgba(255,107,0,0.3);
}
#route-results { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.journey-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px; border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.journey-card.best { border-color: var(--primary); border-width: 2px; }
.best-badge { font-size: 11px; color: var(--primary); font-weight: 600; margin-bottom: 8px; }
.journey-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.journey-dur { font-size: 16px; font-weight: 700; color: var(--text); }
.journey-fare { font-size: 13px; color: var(--success); font-weight: 600; }
.journey-segments { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.segment { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.segment.seg-walk { color: var(--text2); font-style: italic; }
.seg-info { flex: 1; color: var(--text2); }
.seg-dur { color: var(--primary); font-weight: 600; }
.btn-start-nav {
  width: 100%; background: var(--primary); color: white;
  border: none; border-radius: 8px; padding: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.loading-spin { text-align: center; padding: 24px; color: var(--text2); font-size: 14px; }

/* ── Lines Tab ── */
.lines-controls { background: var(--surface); padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-box { display: flex; align-items: center; background: var(--bg); border-radius: 10px; padding: 8px 12px; gap: 8px; margin-bottom: 10px; }
.search-box input { flex: 1; border: none; outline: none; background: none; font-size: 14px; color: var(--text); }
.filter-pills { display: flex; gap: 6px; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: none; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text2); }
.filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
#lines-container { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.line-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 12px 14px; display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.line-card:active { transform: scale(0.98); }
.line-badge-lg { min-width: 44px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; padding: 0 8px; }
.line-info { flex: 1; min-width: 0; }
.line-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.line-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── Detail Pages ── */
.detail-header {
  background: var(--primary); color: white;
  padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.btn-back { background: rgba(255,255,255,0.2); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.detail-title { flex: 1; }
.detail-title h2 { font-size: 16px; font-weight: 600; line-height: 1.2; }
.badge-district { font-size: 11px; background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 10px; }
.btn-fav { background: none; border: none; font-size: 22px; cursor: pointer; color: rgba(255,255,255,0.5); }
.btn-fav.active { color: #FFD700; }
.btn-fav-sm { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text3); padding: 4px; }
.btn-fav-sm.active { color: #FFD700; }

.detail-card { margin: 12px; background: var(--surface); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
.busyness-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.busyness-label { font-size: 13px; color: var(--text2); }
.busyness-val { font-size: 13px; font-weight: 600; padding: 2px 10px; border-radius: 20px; }
.busy-high { background: #FEE2E2; color: #DC2626; }
.busy-mid { background: #FEF3C7; color: #D97706; }
.busy-low { background: #D1FAE5; color: #059669; }
.lines-serving { display: flex; flex-wrap: wrap; gap: 6px; }

.section-title { padding: 12px 14px 6px; font-size: 14px; font-weight: 600; color: var(--text); flex-shrink: 0; }

.predictions-list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
.pred-card { background: var(--surface); border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); }
.pred-line { min-width: 40px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 700; padding: 0 6px; }
.pred-info { flex: 1; }
.pred-name { font-size: 13px; font-weight: 500; }
.pred-occ { font-size: 11px; padding: 1px 8px; border-radius: 10px; display: inline-block; margin-top: 2px; }
.occ-high { background: #FEE2E2; color: #DC2626; }
.occ-mid { background: #FEF3C7; color: #D97706; }
.occ-low { background: #D1FAE5; color: #059669; }
.pred-eta { font-size: 15px; font-weight: 700; color: var(--primary); }

.journey-ideas { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px; }
.journey-idea-card { background: var(--surface); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); cursor: pointer; }
.ji-dest { flex: 1; font-size: 13px; color: var(--text2); }
.ji-dur { font-size: 13px; font-weight: 600; color: var(--primary); }

/* ── Stops Timeline ── */
.stops-timeline { padding: 0 14px 14px; }
.timeline-stop { display: flex; align-items: center; gap: 12px; padding: 10px 0; cursor: pointer; border-bottom: 1px solid var(--border); }
.timeline-stop:last-child { border-bottom: none; }
.timeline-dot { width: 12px; height: 12px; border-radius: 50%; border: 2.5px solid; background: white; flex-shrink: 0; }
.timeline-stop.first .timeline-dot, .timeline-stop.last .timeline-dot { background: var(--primary); }
.timeline-name { font-size: 14px; font-weight: 500; flex: 1; }
.timeline-district { font-size: 12px; color: var(--text3); }

/* ── Stat Row ── */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat-item { text-align: center; }
.stat-n { display: block; font-size: 18px; font-weight: 700; color: var(--primary); }
.stat-l { font-size: 11px; color: var(--text2); }

/* ── Search Tab ── */
.search-controls { background: var(--primary); padding: 14px; flex-shrink: 0; }
.search-controls h2 { color: white; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.search-big-box { background: white; border-radius: var(--radius); padding: 10px 14px; display: flex; gap: 10px; align-items: center; }
.search-big-box input { flex: 1; border: none; outline: none; font-size: 15px; }
#search-results-container { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.search-result-card { background: var(--surface); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); cursor: pointer; }
.result-icon { font-size: 20px; flex-shrink: 0; }
.result-info { flex: 1; }
.result-name { font-size: 14px; font-weight: 500; }
.result-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

/* ── Common ── */
.line-badge-sm { display: inline-flex; align-items: center; justify-content: center; min-width: 32px; height: 22px; padding: 0 6px; border-radius: 5px; color: white; font-size: 11px; font-weight: 700; }
.empty-state { text-align: center; padding: 32px 20px; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="content">

    <!-- TAB: CARTE -->
    <div id="tab-carte" class="tab-pane active">
      <div class="map-search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#94A3B8"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="Chercher un arrêt, quartier..." id="map-search-input"
          onfocus="window.switchTab('chercher')" readonly>
        <button onclick="window.switchTab('trajet')">Itinéraire</button>
      </div>
      <div id="map-canvas"></div>
    </div>

    <!-- TAB: TRAJET -->
    <div id="tab-trajet" class="tab-pane">
      <div class="planner-form">
        <h2>🗺️ Planifier un itinéraire</h2>
        <div class="planner-input-group">
          <div class="planner-row">
            <span>📍</span>
            <input type="text" id="input-from" placeholder="Départ (ou position actuelle)" value="Position actuelle">
          </div>
          <div class="planner-row">
            <span>🏁</span>
            <input type="text" id="input-to" placeholder="Destination (ex: Parcelles, Leclerc...)">
          </div>
        </div>
        <button class="btn-search-route" onclick="window.searchRoute()">🚀 Rechercher</button>
      </div>
      <div id="route-results">
        <div class="empty-state">Entrez une destination pour trouver votre itinéraire</div>
      </div>
    </div>

    <!-- TAB: LIGNES -->
    <div id="tab-lignes" class="tab-pane">
      <div class="lines-controls">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#94A3B8"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="lines-search" placeholder="Numéro de ligne, quartier...">
        </div>
        <div class="filter-pills">
          <button class="filter-btn active" data-f="Tous" onclick="window.setLinesFilter('Tous')">Tous</button>
          <button class="filter-btn" data-f="DDD" onclick="window.setLinesFilter('DDD')">DDD</button>
          <button class="filter-btn" data-f="AFTU-TATA" onclick="window.setLinesFilter('AFTU-TATA')">AFTU</button>
        </div>
      </div>
      <div id="lines-container"></div>
    </div>

    <!-- TAB: CHERCHER -->
    <div id="tab-chercher" class="tab-pane">
      <div class="search-controls">
        <h2>🔍 Recherche</h2>
        <div class="search-big-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#94A3B8"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="search-input" placeholder="Ligne, arrêt, quartier, monument...">
        </div>
      </div>
      <div id="search-results-container">
        <div class="empty-state">Tapez pour rechercher dans le réseau DDD</div>
      </div>
    </div>

    <!-- TAB: FAVORIS -->
    <div id="tab-favoris" class="tab-pane">
      <div class="empty-state" style="margin-top:3rem">Aucun favori. Ajoutez des arrêts et lignes en cliquant sur ♥</div>
    </div>

    <!-- TAB: STOP DETAIL -->
    <div id="tab-stop-detail" class="tab-pane"></div>

    <!-- TAB: LINE DETAIL -->
    <div id="tab-line-detail" class="tab-pane"></div>

  </div><!-- /content -->

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-tab active" data-tab="carte" onclick="window.switchTab('carte')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      Carte
    </button>
    <button class="nav-tab" data-tab="trajet" onclick="window.switchTab('trajet')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/></svg>
      Itinéraire
    </button>
    <button class="nav-tab" data-tab="lignes" onclick="window.switchTab('lignes')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 19.82L5.71 21c2.29-4.72 3.29-10 11.29-12V8zm0-6l-3 3 3 3 3-3-3-3zM5 3L2 6l3 3 3-3L5 3zm12 13c-2.76 0-5 2.24-5 5h10c0-2.76-2.24-5-5-5z"/></svg>
      Lignes
    </button>
    <button class="nav-tab" data-tab="chercher" onclick="window.switchTab('chercher')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Chercher
    </button>
    <button class="nav-tab" data-tab="favoris" onclick="window.switchTab('favoris')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      Favoris
    </button>
  </nav>
</div>

<script type="module" src="/src/app.ts"></script>
</body>
</html>

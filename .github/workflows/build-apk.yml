name: Build SunuBus APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Build release APK (unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename APKs
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk sunubus-v5.0-debug.apk
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk sunubus-v5.0-release.apk 2>/dev/null || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sunubus-v5.0-debug-apk
          path: sunubus-v5.0-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: sunubus-v5.0-release-apk
          path: sunubus-v5.0-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0
          name: SunuBus v5.0 — Application Mobile Passager
          body: |
            ## 🚌 SunuBus v5.0 — Application Mobile Android

            ### Nouvelles fonctionnalités
            - 🗺️ Carte interactive temps réel avec 69 arrêts géocodés
            - 🚌 Bus animés en mouvement sur le réseau DDD
            - 🗺️ Planificateur d'itinéraire multi-segments (direct + correspondances)
            - 💰 Calcul automatique du tarif (150–500 FCFA selon distance)
            - 🔍 Recherche intelligente NLP (Levenshtein + 80+ landmarks Dakar)
            - ⭐ Favoris arrêts et lignes persistants
            - 📊 Fiches arrêt avec prédictions ETA en temps réel
            - 🚌 Fiches ligne avec timeline des arrêts
            - 📱 Interface mobile-first optimisée 5 onglets
            - 🔔 Notifications push natives (Android)

            ### Réseau couvert
            - 30 lignes DDD officielles
            - 69 arrêts géocodés GPS
            - Couverture : Plateau, Parcelles, Guédiawaye, Pikine, Rufisque, Keur Massar

            ### Installation
            Téléchargez `sunubus-v5.0-debug.apk` et installez sur votre appareil Android
            (Paramètres → Sécurité → Sources inconnues)
          files: |
            sunubus-v5.0-debug.apk
            sunubus-v5.0-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
